server.port=8080

# Absolute path to trained model — update this if you move the project
ml.model.path=src/main/resources/model/crop_disease_model.pt
ml.synset.path=src/main/resources/model/synset.txt

# Allow large image uploads (up to 20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.com.cropcare=INFO
logging.level.ai.djl=WARN
